name: Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches:
      - main
    paths:
      - site/**
      - scripts/build-pages-site.mjs
      - skills/android/android-development/**
      - validation/android-development/evals/**
      - validation/android-development/site-showcase.sh
      - README.md
      - .github/workflows/android-development-smoke.yml
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Configure Pages
        uses: actions/configure-pages@v6.0.0

      - name: Build site bundle
        run: |
          node ./scripts/build-pages-site.mjs \
            ./dist/site \
            "" \
            "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/data/latest.json"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: ./dist/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0