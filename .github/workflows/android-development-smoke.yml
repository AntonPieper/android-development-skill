name: Android Development Scenarios

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * 1'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_token: ${{ steps.check.outputs.has_token }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          if [ -n "$GH_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "COPILOT_GITHUB_TOKEN is not set; skipping android-development smoke." >> "$GITHUB_STEP_SUMMARY"
          fi

  smoke:
    needs: preflight
    if: ${{ needs.preflight.outputs.has_token == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      MODEL: gpt-5-mini
      INSTALL_SKILL: '1'
      FAIL_ON_SCENARIO_ERROR: '0'
      RUN_ROOT: /tmp/android-development-scenarios/run-${{ github.run_id }}-${{ github.run_attempt }}
      TIMEOUT_SECONDS: '1500'
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a

      - name: Set up Android SDK tools
        uses: android-actions/setup-android@651bceb6f9ca583f16b8d75b62c36ded2ae6fc9c

      - name: Install emulator and platform packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager \
            "platform-tools" \
            "emulator" \
            "platforms;android-35" \
            "build-tools;36.0.0" \
            "system-images;android-35;default;x86_64"

      - name: Install media tooling
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Enable KVM permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Configure Pages
        if: ${{ !cancelled() }}
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run scenarios with emulator
        if: ${{ !cancelled() }}
        uses: ReactiveCircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a
        with:
          api-level: 35
          target: default
          arch: x86_64
          profile: pixel_7_pro
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: make ci-smoke

      - name: Upload scenario summary
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: android-development-scenarios
          path: |
            ${{ env.RUN_ROOT }}/summary.tsv
            ${{ env.RUN_ROOT }}/skill-package.txt
            ${{ env.RUN_ROOT }}/logs/*.log
            ${{ env.RUN_ROOT }}/scenarios/**
            ${{ env.RUN_ROOT }}/site-dist/**

      - name: Upload Pages artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          path: ${{ env.RUN_ROOT }}/site-dist

  deploy_pages:
    needs:
      - preflight
      - smoke
    if: ${{ needs.preflight.outputs.has_token == 'true' && needs.smoke.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
